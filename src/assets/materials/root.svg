<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- ROOT - 나무뿌리, pixel art 8x8 grid @ 4px -->
  <!-- Main trunk top -->
  <rect x="12" y="0" width="8" height="4" fill="#1a1a1a"/>
  <rect x="12" y="0" width="6" height="2" fill="#8b5c2a"/>
  <!-- Trunk body -->
  <rect x="10" y="4" width="12" height="4" fill="#1a1a1a"/>
  <rect x="10" y="4" width="10" height="2" fill="#a06c38"/>
  <rect x="12" y="4" width="4" height="2" fill="#c48848"/>
  <!-- Trunk mid -->
  <rect x="10" y="8" width="12" height="4" fill="#1a1a1a"/>
  <rect x="10" y="8" width="10" height="2" fill="#8b5c2a"/>
  <rect x="14" y="8" width="4" height="2" fill="#c48848"/>
  <!-- Trunk wide -->
  <rect x="8" y="12" width="16" height="4" fill="#1a1a1a"/>
  <rect x="8" y="12" width="14" height="2" fill="#a06c38"/>
  <!-- Root split -->
  <rect x="8" y="16" width="4" height="4" fill="#1a1a1a"/>
  <rect x="8" y="16" width="2" height="4" fill="#8b5c2a"/>
  <rect x="12" y="16" width="8" height="4" fill="#1a1a1a"/>
  <rect x="12" y="16" width="6" height="2" fill="#a06c38"/>
  <rect x="20" y="16" width="4" height="4" fill="#1a1a1a"/>
  <rect x="20" y="16" width="2" height="4" fill="#8b5c2a"/>
  <!-- Root tendrils -->
  <rect x="4" y="20" width="8" height="4" fill="#1a1a1a"/>
  <rect x="4" y="20" width="6" height="2" fill="#8b5c2a"/>
  <rect x="12" y="20" width="8" height="4" fill="#1a1a1a"/>
  <rect x="12" y="20" width="6" height="2" fill="#6b3c18"/>
  <rect x="20" y="20" width="8" height="4" fill="#1a1a1a"/>
  <rect x="20" y="20" width="6" height="2" fill="#8b5c2a"/>
  <!-- Bottom roots -->
  <rect x="4" y="24" width="4" height="4" fill="#1a1a1a"/>
  <rect x="4" y="24" width="2" height="4" fill="#6b3c18"/>
  <rect x="12" y="24" width="8" height="4" fill="#1a1a1a"/>
  <rect x="12" y="24" width="6" height="2" fill="#6b3c18"/>
  <rect x="24" y="24" width="4" height="4" fill="#1a1a1a"/>
  <rect x="24" y="24" width="2" height="4" fill="#6b3c18"/>
  <!-- Texture knots -->
  <rect x="14" y="6" width="2" height="2" fill="#6b3c18"/>
  <rect x="18" y="10" width="2" height="2" fill="#6b3c18"/>
</svg>
