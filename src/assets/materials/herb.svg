<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- HERB - 약초, pixel art 8x8 grid @ 4px -->
  <!-- Stem -->
  <rect x="14" y="24" width="4" height="8" fill="#1a1a1a"/>
  <rect x="14" y="24" width="2" height="8" fill="#5a8a20"/>
  <!-- Main leaf center -->
  <rect x="8" y="12" width="16" height="4" fill="#1a1a1a"/>
  <rect x="8" y="12" width="14" height="2" fill="#6ab830"/>
  <!-- Leaf top -->
  <rect x="12" y="8" width="8" height="4" fill="#1a1a1a"/>
  <rect x="12" y="8" width="6" height="2" fill="#88d840"/>
  <!-- Leaf tip -->
  <rect x="14" y="4" width="4" height="4" fill="#1a1a1a"/>
  <rect x="14" y="4" width="2" height="4" fill="#88d840"/>
  <!-- Left branch -->
  <rect x="4" y="16" width="8" height="4" fill="#1a1a1a"/>
  <rect x="4" y="16" width="6" height="2" fill="#6ab830"/>
  <!-- Right branch -->
  <rect x="20" y="16" width="8" height="4" fill="#1a1a1a"/>
  <rect x="20" y="16" width="6" height="2" fill="#6ab830"/>
  <!-- Leaf vein highlights -->
  <rect x="14" y="14" width="2" height="2" fill="#aae860"/>
  <rect x="14" y="10" width="2" height="2" fill="#aae860"/>
</svg>
