<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- CRYSTAL - 빛의 수정, pixel art 8x8 grid @ 4px -->
  <!-- Crystal tip -->
  <rect x="14" y="0" width="4" height="4" fill="#1a1a1a"/>
  <rect x="14" y="0" width="2" height="2" fill="#ffffff"/>
  <!-- Upper facets -->
  <rect x="10" y="4" width="12" height="4" fill="#1a1a1a"/>
  <rect x="10" y="4" width="4" height="2" fill="#b8eeff"/>
  <rect x="14" y="4" width="4" height="2" fill="#ffffff"/>
  <rect x="18" y="4" width="4" height="2" fill="#88ccee"/>
  <!-- Upper body -->
  <rect x="8" y="8" width="16" height="4" fill="#1a1a1a"/>
  <rect x="8" y="8" width="4" height="2" fill="#88ccee"/>
  <rect x="12" y="8" width="4" height="2" fill="#ccf0ff"/>
  <rect x="16" y="8" width="4" height="2" fill="#aaddff"/>
  <rect x="20" y="8" width="4" height="2" fill="#5599bb"/>
  <!-- Wide body -->
  <rect x="6" y="12" width="20" height="4" fill="#1a1a1a"/>
  <rect x="6" y="12" width="4" height="2" fill="#5599bb"/>
  <rect x="10" y="12" width="4" height="2" fill="#aaddff"/>
  <rect x="14" y="12" width="4" height="2" fill="#ffffff"/>
  <rect x="18" y="12" width="4" height="2" fill="#aaddff"/>
  <rect x="22" y="12" width="4" height="2" fill="#5599bb"/>
  <!-- Center glow -->
  <rect x="6" y="16" width="20" height="4" fill="#1a1a1a"/>
  <rect x="6" y="16" width="4" height="2" fill="#5599bb"/>
  <rect x="10" y="16" width="4" height="2" fill="#88ccee"/>
  <rect x="14" y="16" width="4" height="2" fill="#ccf0ff"/>
  <rect x="18" y="16" width="4" height="2" fill="#88ccee"/>
  <rect x="22" y="16" width="4" height="2" fill="#5599bb"/>
  <!-- Lower body -->
  <rect x="8" y="20" width="16" height="4" fill="#1a1a1a"/>
  <rect x="8" y="20" width="4" height="2" fill="#3377aa"/>
  <rect x="12" y="20" width="8" height="2" fill="#88ccee"/>
  <rect x="20" y="20" width="4" height="2" fill="#3377aa"/>
  <!-- Bottom facets -->
  <rect x="10" y="24" width="12" height="4" fill="#1a1a1a"/>
  <rect x="10" y="24" width="4" height="2" fill="#3377aa"/>
  <rect x="14" y="24" width="4" height="2" fill="#5599bb"/>
  <rect x="18" y="24" width="4" height="2" fill="#3377aa"/>
  <!-- Crystal bottom tip -->
  <rect x="14" y="28" width="4" height="4" fill="#1a1a1a"/>
  <rect x="14" y="28" width="2" height="2" fill="#3377aa"/>
  <!-- Shine sparkle -->
  <rect x="10" y="6" width="2" height="2" fill="#ffffff"/>
</svg>
