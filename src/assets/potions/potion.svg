<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- POTION - 물약 (HP 50), green bottle pixel art -->
  <!-- Cork -->
  <rect x="12" y="0" width="8" height="4" fill="#1a1a1a"/>
  <rect x="12" y="0" width="6" height="2" fill="#b8864a"/>
  <!-- Neck -->
  <rect x="12" y="4" width="8" height="4" fill="#1a1a1a"/>
  <rect x="12" y="4" width="6" height="2" fill="#224a1a"/>
  <rect x="14" y="4" width="2" height="2" fill="#336625"/>
  <!-- Shoulder -->
  <rect x="8" y="8" width="16" height="4" fill="#1a1a1a"/>
  <rect x="8" y="8" width="14" height="2" fill="#336625"/>
  <rect x="12" y="8" width="4" height="2" fill="#4a8c35"/>
  <!-- Body top -->
  <rect x="6" y="12" width="20" height="4" fill="#1a1a1a"/>
  <rect x="6" y="12" width="18" height="2" fill="#44aa44"/>
  <rect x="8" y="12" width="6" height="2" fill="#66cc55"/>
  <!-- Body -->
  <rect x="4" y="16" width="24" height="4" fill="#1a1a1a"/>
  <rect x="4" y="16" width="22" height="2" fill="#44aa44"/>
  <rect x="8" y="16" width="6" height="2" fill="#88ee66"/>
  <!-- Body center -->
  <rect x="4" y="20" width="24" height="4" fill="#1a1a1a"/>
  <rect x="4" y="20" width="22" height="2" fill="#44aa44"/>
  <rect x="6" y="20" width="4" height="2" fill="#66cc55"/>
  <!-- Body lower -->
  <rect x="6" y="24" width="20" height="4" fill="#1a1a1a"/>
  <rect x="6" y="24" width="18" height="2" fill="#336625"/>
  <!-- Bottom -->
  <rect x="8" y="28" width="16" height="4" fill="#1a1a1a"/>
  <rect x="8" y="28" width="14" height="2" fill="#224a1a"/>
  <!-- Shine highlight -->
  <rect x="8" y="14" width="4" height="4" fill="#aaffaa"/>
</svg>
