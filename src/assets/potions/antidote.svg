<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- ANTIDOTE - 해독제, purple bottle pixel art -->
  <!-- Cork -->
  <rect x="12" y="0" width="8" height="4" fill="#1a1a1a"/>
  <rect x="12" y="0" width="6" height="2" fill="#b8864a"/>
  <!-- Neck -->
  <rect x="12" y="4" width="8" height="4" fill="#1a1a1a"/>
  <rect x="12" y="4" width="6" height="2" fill="#3a1a5a"/>
  <rect x="14" y="4" width="2" height="2" fill="#6633aa"/>
  <!-- Shoulder -->
  <rect x="8" y="8" width="16" height="4" fill="#1a1a1a"/>
  <rect x="8" y="8" width="14" height="2" fill="#6633aa"/>
  <rect x="12" y="8" width="4" height="2" fill="#8855cc"/>
  <!-- Body top -->
  <rect x="6" y="12" width="20" height="4" fill="#1a1a1a"/>
  <rect x="6" y="12" width="18" height="2" fill="#7744bb"/>
  <rect x="8" y="12" width="6" height="2" fill="#aa77dd"/>
  <!-- Body -->
  <rect x="4" y="16" width="24" height="4" fill="#1a1a1a"/>
  <rect x="4" y="16" width="22" height="2" fill="#8855cc"/>
  <rect x="8" y="16" width="6" height="2" fill="#bbaaee"/>
  <!-- Body center - cross symbol -->
  <rect x="4" y="20" width="24" height="4" fill="#1a1a1a"/>
  <rect x="4" y="20" width="22" height="2" fill="#7744bb"/>
  <!-- Antidote cross symbol -->
  <rect x="14" y="16" width="4" height="8" fill="#44cc88"/>
  <rect x="10" y="18" width="12" height="4" fill="#44cc88"/>
  <!-- Body lower -->
  <rect x="6" y="24" width="20" height="4" fill="#1a1a1a"/>
  <rect x="6" y="24" width="18" height="2" fill="#6633aa"/>
  <!-- Bottom -->
  <rect x="8" y="28" width="16" height="4" fill="#1a1a1a"/>
  <rect x="8" y="28" width="14" height="2" fill="#3a1a5a"/>
  <!-- Shine highlight -->
  <rect x="8" y="14" width="4" height="4" fill="#ddbbff"/>
</svg>
