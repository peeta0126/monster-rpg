<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- MAX POTION - 맥스 물약 (full heal), gold/yellow glowing bottle -->
  <!-- Cork with gem top -->
  <rect x="14" y="0" width="4" height="4" fill="#1a1a1a"/>
  <rect x="14" y="0" width="2" height="2" fill="#88ddff"/>
  <rect x="12" y="4" width="8" height="4" fill="#1a1a1a"/>
  <rect x="12" y="4" width="6" height="2" fill="#c8a830"/>
  <!-- Neck -->
  <rect x="12" y="8" width="8" height="4" fill="#1a1a1a"/>
  <rect x="12" y="8" width="6" height="2" fill="#5a3a00"/>
  <rect x="14" y="8" width="2" height="2" fill="#aa8820"/>
  <!-- Shoulder -->
  <rect x="8" y="12" width="16" height="4" fill="#1a1a1a"/>
  <rect x="8" y="12" width="14" height="2" fill="#aa8820"/>
  <rect x="12" y="12" width="4" height="2" fill="#eecc44"/>
  <!-- Body top -->
  <rect x="6" y="16" width="20" height="4" fill="#1a1a1a"/>
  <rect x="6" y="16" width="18" height="2" fill="#ddaa22"/>
  <rect x="8" y="16" width="6" height="2" fill="#ffdd55"/>
  <!-- Body center glow -->
  <rect x="4" y="20" width="24" height="4" fill="#1a1a1a"/>
  <rect x="4" y="20" width="22" height="2" fill="#eecc44"/>
  <rect x="8" y="20" width="4" height="2" fill="#ffffaa"/>
  <!-- Body lower -->
  <rect x="4" y="24" width="24" height="4" fill="#1a1a1a"/>
  <rect x="4" y="24" width="22" height="2" fill="#ddaa22"/>
  <rect x="6" y="24" width="4" height="2" fill="#ffdd55"/>
  <!-- Bottom -->
  <rect x="6" y="28" width="20" height="4" fill="#1a1a1a"/>
  <rect x="6" y="28" width="18" height="2" fill="#aa8820"/>
  <!-- Sparkle effects -->
  <rect x="6" y="18" width="2" height="2" fill="#ffffff"/>
  <rect x="24" y="22" width="2" height="2" fill="#ffffff"/>
  <rect x="14" y="14" width="4" height="2" fill="#ffffff"/>
  <!-- Inner liquid glow -->
  <rect x="10" y="18" width="4" height="6" fill="#ffffcc"/>
</svg>
