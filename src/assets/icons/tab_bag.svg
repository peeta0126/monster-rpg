<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" shape-rendering="crispEdges">
  <!-- 가방 탭 - bag icon pixel art -->
  <!-- Strap loop -->
  <rect x="8" y="2" width="8" height="2" fill="#1a1a1a"/>
  <rect x="6" y="4" width="2" height="4" fill="#1a1a1a"/>
  <rect x="16" y="4" width="2" height="4" fill="#1a1a1a"/>
  <!-- Bag body top -->
  <rect x="4" y="8" width="16" height="2" fill="#1a1a1a"/>
  <!-- Bag body -->
  <rect x="2" y="10" width="20" height="2" fill="#1a1a1a"/>
  <rect x="2" y="10" width="18" height="2" fill="#8855aa"/>
  <!-- Bag middle -->
  <rect x="2" y="12" width="20" height="2" fill="#1a1a1a"/>
  <rect x="2" y="12" width="18" height="2" fill="#9966bb"/>
  <!-- Bag flap line -->
  <rect x="2" y="14" width="20" height="2" fill="#1a1a1a"/>
  <rect x="4" y="14" width="16" height="2" fill="#7744aa"/>
  <!-- Bag lower body -->
  <rect x="2" y="16" width="20" height="2" fill="#1a1a1a"/>
  <rect x="2" y="16" width="18" height="2" fill="#9966bb"/>
  <!-- Bag bottom -->
  <rect x="2" y="18" width="20" height="2" fill="#1a1a1a"/>
  <rect x="2" y="18" width="18" height="2" fill="#8855aa"/>
  <!-- Bag base -->
  <rect x="4" y="20" width="16" height="2" fill="#1a1a1a"/>
  <rect x="4" y="20" width="14" height="2" fill="#7744aa"/>
  <!-- Clasp -->
  <rect x="10" y="14" width="4" height="2" fill="#ffcc44"/>
</svg>
