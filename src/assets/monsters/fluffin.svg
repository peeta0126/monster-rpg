<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- fluffy ear puffs -->
  <rect x="1" y="0" width="2" height="1" fill="#e8c0d8"/>
  <rect x="11" y="0" width="2" height="1" fill="#e8c0d8"/>
  <!-- ears wide -->
  <rect x="0" y="1" width="4" height="1" fill="#e8c0d8"/>
  <rect x="10" y="1" width="4" height="1" fill="#e8c0d8"/>
  <!-- ears -->
  <rect x="0" y="2" width="4" height="1" fill="#e8c0d8"/>
  <rect x="10" y="2" width="4" height="1" fill="#e8c0d8"/>
  <!-- ear base + head connect -->
  <rect x="1" y="3" width="2" height="1" fill="#e8c0d8"/>
  <rect x="4" y="3" width="6" height="1" fill="#e8c0d8"/>
  <rect x="11" y="3" width="2" height="1" fill="#e8c0d8"/>
  <!-- head -->
  <rect x="2" y="4" width="10" height="1" fill="#e8c0d8"/>
  <!-- eyes -->
  <rect x="1" y="5" width="4" height="1" fill="#e8c0d8"/>
  <rect x="5" y="5" width="1" height="1" fill="#FFFFFF"/>
  <rect x="6" y="5" width="1" height="1" fill="#5533AA"/>
  <rect x="7" y="5" width="2" height="1" fill="#e8c0d8"/>
  <rect x="9" y="5" width="1" height="1" fill="#5533AA"/>
  <rect x="10" y="5" width="1" height="1" fill="#FFFFFF"/>
  <rect x="11" y="5" width="3" height="1" fill="#e8c0d8"/>
  <!-- eyes row 2 -->
  <rect x="1" y="6" width="4" height="1" fill="#e8c0d8"/>
  <rect x="5" y="6" width="1" height="1" fill="#FFFFFF"/>
  <rect x="6" y="6" width="1" height="1" fill="#5533AA"/>
  <rect x="7" y="6" width="2" height="1" fill="#e8c0d8"/>
  <rect x="9" y="6" width="1" height="1" fill="#5533AA"/>
  <rect x="10" y="6" width="1" height="1" fill="#FFFFFF"/>
  <rect x="11" y="6" width="3" height="1" fill="#e8c0d8"/>
  <!-- full head row -->
  <rect x="1" y="7" width="12" height="1" fill="#e8c0d8"/>
  <!-- blush cheeks + nose -->
  <rect x="2" y="8" width="3" height="1" fill="#e8c0d8"/>
  <rect x="5" y="8" width="1" height="1" fill="#d08898"/>
  <rect x="6" y="8" width="1" height="1" fill="#e8c0d8"/>
  <rect x="7" y="8" width="1" height="1" fill="#d08898"/>
  <rect x="8" y="8" width="1" height="1" fill="#e8c0d8"/>
  <rect x="9" y="8" width="1" height="1" fill="#d08898"/>
  <rect x="10" y="8" width="3" height="1" fill="#e8c0d8"/>
  <!-- belly -->
  <rect x="3" y="9" width="1" height="1" fill="#e8c0d8"/>
  <rect x="4" y="9" width="7" height="1" fill="#f0d8e8"/>
  <rect x="11" y="9" width="1" height="1" fill="#e8c0d8"/>
  <!-- belly center -->
  <rect x="3" y="10" width="1" height="1" fill="#e8c0d8"/>
  <rect x="4" y="10" width="2" height="1" fill="#f0d8e8"/>
  <rect x="6" y="10" width="1" height="1" fill="#5533AA"/>
  <rect x="7" y="10" width="2" height="1" fill="#f0d8e8"/>
  <rect x="9" y="10" width="1" height="1" fill="#5533AA"/>
  <rect x="10" y="10" width="1" height="1" fill="#f0d8e8"/>
  <rect x="11" y="10" width="1" height="1" fill="#e8c0d8"/>
  <!-- belly bottom -->
  <rect x="4" y="11" width="1" height="1" fill="#e8c0d8"/>
  <rect x="5" y="11" width="5" height="1" fill="#f0d8e8"/>
  <rect x="10" y="11" width="1" height="1" fill="#e8c0d8"/>
  <!-- body -->
  <rect x="4" y="12" width="6" height="1" fill="#e8c0d8"/>
  <!-- body -->
  <rect x="4" y="13" width="6" height="1" fill="#e8c0d8"/>
  <!-- fluffy feet -->
  <rect x="2" y="14" width="3" height="1" fill="#e8c0d8"/>
  <rect x="9" y="14" width="3" height="1" fill="#e8c0d8"/>
  <!-- feet bottom -->
  <rect x="1" y="15" width="2" height="1" fill="#e8c0d8"/>
  <rect x="11" y="15" width="2" height="1" fill="#e8c0d8"/>
</svg>
