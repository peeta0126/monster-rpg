<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" shape-rendering="crispEdges">
  <!-- FLUFFIN - Fluffy normal creature, Pokemon BW style, 20x20 grid @ 4px -->
  <!-- ── 솜털 귀 (둥글고 큰) ── -->
  <!-- 왼쪽 귀 -->
  <rect x="4"  y="0"  width="16" height="4"  fill="#1a1a1a"/>
  <rect x="4"  y="0"  width="12" height="4"  fill="#f0a0c0"/>
  <rect x="4"  y="4"  width="4"  height="8"  fill="#1a1a1a"/>
  <rect x="8"  y="4"  width="8"  height="8"  fill="#f8c8d8"/>
  <rect x="16" y="4"  width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="10" y="6"  width="4"  height="4"  fill="#ffd0e0"/>  <!-- 귀 안쪽 밝음 -->
  <!-- 오른쪽 귀 -->
  <rect x="48" y="0"  width="16" height="4"  fill="#1a1a1a"/>
  <rect x="52" y="0"  width="12" height="4"  fill="#f0a0c0"/>
  <rect x="60" y="4"  width="4"  height="8"  fill="#1a1a1a"/>
  <rect x="52" y="4"  width="8"  height="8"  fill="#f8c8d8"/>
  <rect x="48" y="4"  width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="54" y="6"  width="4"  height="4"  fill="#ffd0e0"/>
  <!-- ── 머리 ── -->
  <rect x="4"  y="12" width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="8"  y="12" width="48" height="4"  fill="#f8c8d8"/>
  <rect x="12" y="12" width="8"  height="4"  fill="#ffd8e8"/>
  <rect x="56" y="12" width="4"  height="4"  fill="#1a1a1a"/>
  <!-- 머리 폭 -->
  <rect x="0"  y="16" width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="4"  y="16" width="56" height="4"  fill="#f8c8d8"/>
  <rect x="60" y="16" width="4"  height="4"  fill="#1a1a1a"/>
  <!-- ── 눈 (크고 반짝이는) ── -->
  <rect x="0"  y="20" width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="4"  y="20" width="8"  height="4"  fill="#f8c8d8"/>
  <rect x="12" y="20" width="4"  height="4"  fill="#ffffff"/>
  <rect x="16" y="20" width="8"  height="4"  fill="#5533aa"/>  <!-- 보라 눈동자 -->
  <rect x="24" y="20" width="12" height="4"  fill="#f8c8d8"/>
  <rect x="36" y="20" width="8"  height="4"  fill="#5533aa"/>
  <rect x="44" y="20" width="4"  height="4"  fill="#ffffff"/>
  <rect x="48" y="20" width="8"  height="4"  fill="#f8c8d8"/>
  <rect x="56" y="20" width="4"  height="4"  fill="#1a1a1a"/>
  <!-- 눈 2줄 -->
  <rect x="0"  y="24" width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="4"  y="24" width="8"  height="4"  fill="#f8c8d8"/>
  <rect x="12" y="24" width="4"  height="4"  fill="#ffffff"/>
  <rect x="16" y="24" width="8"  height="4"  fill="#5533aa"/>
  <rect x="24" y="24" width="12" height="4"  fill="#f8c8d8"/>
  <rect x="36" y="24" width="8"  height="4"  fill="#5533aa"/>
  <rect x="44" y="24" width="4"  height="4"  fill="#ffffff"/>
  <rect x="48" y="24" width="8"  height="4"  fill="#f8c8d8"/>
  <rect x="56" y="24" width="4"  height="4"  fill="#1a1a1a"/>
  <!-- 눈 하이라이트 -->
  <rect x="14" y="20" width="2"  height="2"  fill="#ffffff"/>
  <rect x="38" y="20" width="2"  height="2"  fill="#ffffff"/>
  <!-- ── 볼 (블러쉬) + 코 ── -->
  <rect x="0"  y="28" width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="4"  y="28" width="8"  height="4"  fill="#f0a0c0"/>  <!-- 볼 붉음 -->
  <rect x="12" y="28" width="8"  height="4"  fill="#f8c8d8"/>
  <rect x="20" y="28" width="4"  height="4"  fill="#d87898"/>  <!-- 코 -->
  <rect x="24" y="28" width="4"  height="4"  fill="#f8c8d8"/>
  <rect x="28" y="28" width="8"  height="4"  fill="#f8c8d8"/>
  <rect x="36" y="28" width="4"  height="4"  fill="#d87898"/>
  <rect x="40" y="28" width="8"  height="4"  fill="#f8c8d8"/>
  <rect x="48" y="28" width="8"  height="4"  fill="#f0a0c0"/>
  <rect x="56" y="28" width="4"  height="4"  fill="#1a1a1a"/>
  <!-- ── 몸통 (둥글고 통통) ── -->
  <rect x="0"  y="32" width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="4"  y="32" width="56" height="4"  fill="#f8c8d8"/>
  <rect x="60" y="32" width="4"  height="4"  fill="#1a1a1a"/>
  <!-- 배 밝음 -->
  <rect x="0"  y="36" width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="4"  y="36" width="8"  height="4"  fill="#f8c8d8"/>
  <rect x="12" y="36" width="40" height="4"  fill="#ffd8e8"/>
  <rect x="52" y="36" width="8"  height="4"  fill="#f8c8d8"/>
  <rect x="60" y="36" width="4"  height="4"  fill="#1a1a1a"/>
  <!-- 배 무늬 (두 개 눈 같은 점) -->
  <rect x="0"  y="40" width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="4"  y="40" width="8"  height="4"  fill="#f8c8d8"/>
  <rect x="12" y="40" width="8"  height="4"  fill="#ffd8e8"/>
  <rect x="20" y="40" width="8"  height="4"  fill="#5533aa"/>  <!-- 배 무늬 -->
  <rect x="28" y="40" width="8"  height="4"  fill="#ffd8e8"/>
  <rect x="36" y="40" width="8"  height="4"  fill="#5533aa"/>  <!-- 배 무늬 -->
  <rect x="44" y="40" width="8"  height="4"  fill="#ffd8e8"/>
  <rect x="52" y="40" width="8"  height="4"  fill="#f8c8d8"/>
  <rect x="60" y="40" width="4"  height="4"  fill="#1a1a1a"/>
  <!-- 몸통 하단 -->
  <rect x="4"  y="44" width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="8"  y="44" width="48" height="4"  fill="#f8c8d8"/>
  <rect x="56" y="44" width="4"  height="4"  fill="#1a1a1a"/>
  <!-- ── 하단 몸통 + 솜털 ── -->
  <rect x="8"  y="48" width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="12" y="48" width="40" height="4"  fill="#f0a0c0"/>
  <rect x="52" y="48" width="4"  height="4"  fill="#1a1a1a"/>
  <!-- ── 다리 (짧고 통통) ── -->
  <rect x="8"  y="52" width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="12" y="52" width="16" height="4"  fill="#f8c8d8"/>
  <rect x="28" y="52" width="8"  height="4"  fill="#1a1a1a"/>
  <rect x="36" y="52" width="16" height="4"  fill="#f8c8d8"/>
  <rect x="52" y="52" width="4"  height="4"  fill="#1a1a1a"/>
  <!-- 발 -->
  <rect x="8"  y="56" width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="12" y="56" width="16" height="4"  fill="#f0a0c0"/>
  <rect x="28" y="56" width="8"  height="4"  fill="#1a1a1a"/>
  <rect x="36" y="56" width="16" height="4"  fill="#f0a0c0"/>
  <rect x="52" y="56" width="4"  height="4"  fill="#1a1a1a"/>
  <!-- 발바닥 -->
  <rect x="4"  y="60" width="28" height="4"  fill="#1a1a1a"/>
  <rect x="36" y="60" width="24" height="4"  fill="#1a1a1a"/>
</svg>
