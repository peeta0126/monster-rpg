<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- row 0: ear tips -->
  <rect x="4" y="0" width="1" height="1" fill="#FFD700"/>
  <rect x="10" y="0" width="1" height="1" fill="#FFD700"/>
  <!-- row 1: ears -->
  <rect x="3" y="1" width="3" height="1" fill="#FFD700"/>
  <rect x="9" y="1" width="3" height="1" fill="#FFD700"/>
  <!-- row 2: ears -->
  <rect x="3" y="2" width="3" height="1" fill="#FFD700"/>
  <rect x="9" y="2" width="3" height="1" fill="#FFD700"/>
  <!-- row 3: ear base + head connect -->
  <rect x="4" y="3" width="1" height="1" fill="#FFD700"/>
  <rect x="6" y="3" width="3" height="1" fill="#FFD700"/>
  <rect x="10" y="3" width="1" height="1" fill="#FFD700"/>
  <!-- row 4: head top -->
  <rect x="2" y="4" width="11" height="1" fill="#FFD700"/>
  <!-- row 5: eyes row -->
  <rect x="1" y="5" width="2" height="1" fill="#FFD700"/>
  <rect x="3" y="5" width="1" height="1" fill="#FFFFFF"/>
  <rect x="4" y="5" width="1" height="1" fill="#1a1a1a"/>
  <rect x="5" y="5" width="5" height="1" fill="#FFD700"/>
  <rect x="10" y="5" width="1" height="1" fill="#1a1a1a"/>
  <rect x="11" y="5" width="1" height="1" fill="#FFFFFF"/>
  <rect x="12" y="5" width="2" height="1" fill="#FFD700"/>
  <!-- row 6: eyes row 2 -->
  <rect x="1" y="6" width="2" height="1" fill="#FFD700"/>
  <rect x="3" y="6" width="1" height="1" fill="#FFFFFF"/>
  <rect x="4" y="6" width="1" height="1" fill="#1a1a1a"/>
  <rect x="5" y="6" width="5" height="1" fill="#FFD700"/>
  <rect x="10" y="6" width="1" height="1" fill="#1a1a1a"/>
  <rect x="11" y="6" width="1" height="1" fill="#FFFFFF"/>
  <rect x="12" y="6" width="2" height="1" fill="#FFD700"/>
  <!-- row 7: cheeks (orange sparks) -->
  <rect x="1" y="7" width="4" height="1" fill="#FFD700"/>
  <rect x="5" y="7" width="1" height="1" fill="#FF8C00"/>
  <rect x="6" y="7" width="3" height="1" fill="#FFD700"/>
  <rect x="9" y="7" width="1" height="1" fill="#FF8C00"/>
  <rect x="10" y="7" width="4" height="1" fill="#FFD700"/>
  <!-- row 8: belly top -->
  <rect x="2" y="8" width="2" height="1" fill="#FFD700"/>
  <rect x="4" y="8" width="7" height="1" fill="#FFF0A0"/>
  <rect x="11" y="8" width="2" height="1" fill="#FFD700"/>
  <!-- row 9: lightning bolt belly -->
  <rect x="3" y="9" width="1" height="1" fill="#FFD700"/>
  <rect x="4" y="9" width="2" height="1" fill="#FFF0A0"/>
  <rect x="6" y="9" width="1" height="1" fill="#FF8C00"/>
  <rect x="7" y="9" width="2" height="1" fill="#FFF0A0"/>
  <rect x="9" y="9" width="1" height="1" fill="#FF8C00"/>
  <rect x="10" y="9" width="2" height="1" fill="#FFF0A0"/>
  <rect x="12" y="9" width="1" height="1" fill="#FFD700"/>
  <!-- row 10: lightning -->
  <rect x="3" y="10" width="1" height="1" fill="#FFD700"/>
  <rect x="4" y="10" width="3" height="1" fill="#FFF0A0"/>
  <rect x="7" y="10" width="1" height="1" fill="#FF8C00"/>
  <rect x="8" y="10" width="4" height="1" fill="#FFF0A0"/>
  <rect x="12" y="10" width="1" height="1" fill="#FFD700"/>
  <!-- row 11: belly bottom -->
  <rect x="3" y="11" width="1" height="1" fill="#FFD700"/>
  <rect x="4" y="11" width="8" height="1" fill="#FFF0A0"/>
  <rect x="12" y="11" width="1" height="1" fill="#FFD700"/>
  <!-- row 12: body -->
  <rect x="4" y="12" width="8" height="1" fill="#FFD700"/>
  <!-- row 13: body -->
  <rect x="4" y="13" width="8" height="1" fill="#FFD700"/>
  <!-- row 14: feet -->
  <rect x="3" y="14" width="3" height="1" fill="#FFC400"/>
  <rect x="10" y="14" width="3" height="1" fill="#FFC400"/>
  <!-- row 15: feet bottom -->
  <rect x="2" y="15" width="2" height="1" fill="#FFC400"/>
  <rect x="12" y="15" width="2" height="1" fill="#FFC400"/>
</svg>
