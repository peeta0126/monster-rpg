<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- ears/spikes -->
  <polygon points="22,34 14,14 30,26" fill="#FFD700" stroke="#FFA500" stroke-width="1.5"/>
  <polygon points="58,34 66,14 50,26" fill="#FFD700" stroke="#FFA500" stroke-width="1.5"/>
  <polygon points="22,34 14,14 30,26" fill="#FFEB00" opacity="0.5"/>
  <!-- body -->
  <ellipse cx="40" cy="50" rx="22" ry="20" fill="#FFD700"/>
  <!-- belly -->
  <ellipse cx="40" cy="53" rx="13" ry="11" fill="#FFF0A0"/>
  <!-- lightning bolt on belly -->
  <polygon points="38,43 44,51 40,51 46,61 34,51 38,51" fill="#FF8C00"/>
  <!-- eyes -->
  <circle cx="32" cy="46" r="4" fill="white"/>
  <circle cx="48" cy="46" r="4" fill="white"/>
  <circle cx="33" cy="47" r="2" fill="#222"/>
  <circle cx="49" cy="47" r="2" fill="#222"/>
  <circle cx="33.5" cy="46" r="0.8" fill="white"/>
  <circle cx="49.5" cy="46" r="0.8" fill="white"/>
  <!-- cheek sparks -->
  <ellipse cx="27" cy="52" rx="4" ry="3" fill="#FFA500" opacity="0.7"/>
  <ellipse cx="53" cy="52" rx="4" ry="3" fill="#FFA500" opacity="0.7"/>
  <!-- small spark lines on cheeks -->
  <line x1="24" y1="50" x2="22" y2="48" stroke="#FF8C00" stroke-width="1.2"/>
  <line x1="24" y1="52" x2="21" y2="52" stroke="#FF8C00" stroke-width="1.2"/>
  <line x1="56" y1="50" x2="58" y2="48" stroke="#FF8C00" stroke-width="1.2"/>
  <line x1="56" y1="52" x2="59" y2="52" stroke="#FF8C00" stroke-width="1.2"/>
  <!-- mouth -->
  <path d="M36,56 Q40,59 44,56" stroke="#CC8800" stroke-width="1.5" fill="none"/>
  <!-- feet -->
  <ellipse cx="32" cy="70" rx="9" ry="5" fill="#FFC400"/>
  <ellipse cx="48" cy="70" rx="9" ry="5" fill="#FFC400"/>
  <!-- tail lightning -->
  <polyline points="60,55 66,50 62,46 68,42" stroke="#FFD700" stroke-width="2.5" fill="none" stroke-linecap="round"/>
</svg>
