  <rect x="4"  y="32" width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="8"  y="32" width="8"  height="4"  fill="#66cc44"/>
  <rect x="16" y="32" width="32" height="4"  fill="#aaff88"/>
  <rect x="48" y="32" width="8"  height="4"  fill="#66cc44"/>
  <rect x="56" y="32" width="4"  height="4"  fill="#1a1a1a"/>
