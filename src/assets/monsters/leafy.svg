  <rect x="8"  y="40" width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="12" y="40" width="40" height="4"  fill="#66cc44"/>
  <rect x="52" y="40" width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="12" y="44" width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="16" y="44" width="32" height="4"  fill="#66cc44"/>
  <rect x="48" y="44" width="4"  height="4"  fill="#1a1a1a"/>
