  <rect x="12" y="48" width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="16" y="48" width="12" height="4"  fill="#66cc44"/>
  <rect x="28" y="48" width="8"  height="4"  fill="#1a1a1a"/>
  <rect x="36" y="48" width="12" height="4"  fill="#66cc44"/>
  <rect x="48" y="48" width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="12" y="52" width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="16" y="52" width="12" height="4"  fill="#55bb33"/>
  <rect x="28" y="52" width="8"  height="4"  fill="#1a1a1a"/>
  <rect x="36" y="52" width="12" height="4"  fill="#55bb33"/>
  <rect x="48" y="52" width="4"  height="4"  fill="#1a1a1a"/>
  <!-- 발 (잎사귀 모양) -->
  <rect x="8"  y="56" width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="12" y="56" width="16" height="4"  fill="#44aa33"/>
  <rect x="28" y="56" width="8"  height="4"  fill="#1a1a1a"/>
  <rect x="36" y="56" width="16" height="4"  fill="#44aa33"/>
  <rect x="52" y="56" width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="8"  y="60" width="24" height="4"  fill="#1a1a1a"/>
  <rect x="36" y="60" width="20" height="4"  fill="#1a1a1a"/>
