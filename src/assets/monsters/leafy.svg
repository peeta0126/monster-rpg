  <rect x="8"  y="36" width="8"  height="4"  fill="#66cc44"/>
  <rect x="16" y="36" width="4"  height="4"  fill="#aaff88"/>
  <rect x="20" y="36" width="4"  height="4"  fill="#44aa33"/>
  <rect x="24" y="36" width="8"  height="4"  fill="#aaff88"/>
  <rect x="32" y="36" width="4"  height="4"  fill="#44aa33"/>
  <rect x="36" y="36" width="8"  height="4"  fill="#aaff88"/>
  <rect x="44" y="36" width="4"  height="4"  fill="#44aa33"/>
  <rect x="48" y="36" width="8"  height="4"  fill="#66cc44"/>
  <rect x="56" y="36" width="4"  height="4"  fill="#1a1a1a"/>
