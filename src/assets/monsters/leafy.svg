  <rect x="4"  y="16" width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="8"  y="16" width="8"  height="4"  fill="#88ee66"/>
  <rect x="16" y="16" width="4"  height="4"  fill="#ffffff"/>
  <rect x="20" y="16" width="4"  height="4"  fill="#227722"/>
  <rect x="24" y="16" width="12" height="4"  fill="#88ee66"/>
  <rect x="36" y="16" width="4"  height="4"  fill="#227722"/>
  <rect x="40" y="16" width="4"  height="4"  fill="#ffffff"/>
  <rect x="44" y="16" width="8"  height="4"  fill="#88ee66"/>
  <rect x="52" y="16" width="4"  height="4"  fill="#1a1a1a"/>
  <!-- 눈 2줄 -->
  <rect x="4"  y="20" width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="8"  y="20" width="8"  height="4"  fill="#88ee66"/>
  <rect x="16" y="20" width="4"  height="4"  fill="#ffffff"/>
  <rect x="20" y="20" width="4"  height="4"  fill="#227722"/>
  <rect x="24" y="20" width="12" height="4"  fill="#88ee66"/>
  <rect x="36" y="20" width="4"  height="4"  fill="#227722"/>
