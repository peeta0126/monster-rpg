  <rect x="24" y="4"  width="16" height="4"  fill="#1a1a1a"/>
  <rect x="24" y="4"  width="12" height="4"  fill="#66cc33"/>
  <!-- 오른쪽 잎 -->
  <rect x="52" y="0"  width="8"  height="4"  fill="#1a1a1a"/>
  <rect x="56" y="0"  width="4"  height="4"  fill="#55cc44"/>
  <rect x="56" y="4"  width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="52" y="4"  width="4"  height="4"  fill="#44aa33"/>
  <!-- ── 머리 ── -->
  <rect x="8"  y="8"  width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="12" y="8"  width="40" height="4"  fill="#88ee66"/>
  <rect x="16" y="8"  width="8"  height="4"  fill="#aaff88"/>
  <rect x="52" y="8"  width="4"  height="4"  fill="#1a1a1a"/>
