<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" shape-rendering="crispEdges">
  <!-- LEAFY - Grass sprite/fairy, Pokemon BW style, 20x20 grid @ 4px -->
  <!-- ── 머리 잎사귀 (왕관처럼) ── -->
  <!-- 왼쪽 잎 -->
  <rect x="4"  y="0"  width="8"  height="4"  fill="#1a1a1a"/>
  <rect x="4"  y="0"  width="4"  height="4"  fill="#55cc44"/>
  <rect x="4"  y="4"  width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="8"  y="4"  width="4"  height="4"  fill="#44aa33"/>
  <rect x="4"  y="4"  width="4"  height="4"  fill="#1a1a1a"/>
  <!-- 중앙 잎 -->
  <rect x="28" y="0"  width="8"  height="4"  fill="#1a1a1a"/>
