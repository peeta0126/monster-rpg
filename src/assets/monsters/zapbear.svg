<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- row 0: ears outer -->
  <rect x="0" y="0" width="2" height="1" fill="#3A3A4A"/>
  <rect x="12" y="0" width="2" height="1" fill="#3A3A4A"/>
  <!-- row 1: ears with lightning yellow -->
  <rect x="0" y="1" width="1" height="1" fill="#3A3A4A"/>
  <rect x="1" y="1" width="1" height="1" fill="#FFD700"/>
  <rect x="2" y="1" width="1" height="1" fill="#3A3A4A"/>
  <rect x="11" y="1" width="1" height="1" fill="#3A3A4A"/>
  <rect x="12" y="1" width="1" height="1" fill="#FFD700"/>
  <rect x="13" y="1" width="1" height="1" fill="#3A3A4A"/>
  <!-- row 2: ears same -->
  <rect x="0" y="2" width="1" height="1" fill="#3A3A4A"/>
  <rect x="1" y="2" width="1" height="1" fill="#FFD700"/>
  <rect x="2" y="2" width="1" height="1" fill="#3A3A4A"/>
  <rect x="11" y="2" width="1" height="1" fill="#3A3A4A"/>
  <rect x="12" y="2" width="1" height="1" fill="#FFD700"/>
  <rect x="13" y="2" width="1" height="1" fill="#3A3A4A"/>
  <!-- row 3: ear base + head connect -->
  <rect x="0" y="3" width="2" height="1" fill="#3A3A4A"/>
  <rect x="3" y="3" width="8" height="1" fill="#3A3A4A"/>
  <rect x="12" y="3" width="2" height="1" fill="#3A3A4A"/>
  <!-- row 4: head top -->
  <rect x="2" y="4" width="10" height="1" fill="#3A3A4A"/>
  <!-- row 5: eyes -->
  <rect x="2" y="5" width="1" height="1" fill="#3A3A4A"/>
  <rect x="3" y="5" width="1" height="1" fill="#FFFFFF"/>
  <rect x="4" y="5" width="1" height="1" fill="#1a1a1a"/>
  <rect x="5" y="5" width="2" height="1" fill="#3A3A4A"/>
  <rect x="7" y="5" width="1" height="1" fill="#5A5A6E"/>
  <rect x="8" y="5" width="2" height="1" fill="#3A3A4A"/>
  <rect x="10" y="5" width="1" height="1" fill="#1a1a1a"/>
  <rect x="11" y="5" width="1" height="1" fill="#FFFFFF"/>
  <rect x="12" y="5" width="1" height="1" fill="#3A3A4A"/>
  <!-- row 6: eyes + snout -->
  <rect x="2" y="6" width="1" height="1" fill="#3A3A4A"/>
  <rect x="3" y="6" width="1" height="1" fill="#FFFFFF"/>
  <rect x="4" y="6" width="1" height="1" fill="#1a1a1a"/>
  <rect x="5" y="6" width="1" height="1" fill="#3A3A4A"/>
  <rect x="6" y="6" width="3" height="1" fill="#5A5A6E"/>
  <rect x="9" y="6" width="1" height="1" fill="#3A3A4A"/>
  <rect x="10" y="6" width="1" height="1" fill="#1a1a1a"/>
  <rect x="11" y="6" width="1" height="1" fill="#FFFFFF"/>
  <rect x="12" y="6" width="1" height="1" fill="#3A3A4A"/>
  <!-- row 7: snout/belly -->
  <rect x="2" y="7" width="3" height="1" fill="#3A3A4A"/>
  <rect x="5" y="7" width="5" height="1" fill="#5A5A6E"/>
  <rect x="10" y="7" width="3" height="1" fill="#3A3A4A"/>
  <!-- row 8: nose + lightning stripes -->
  <rect x="0" y="8" width="1" height="1" fill="#3A3A4A"/>
  <rect x="4" y="8" width="1" height="1" fill="#3A3A4A"/>
  <rect x="5" y="8" width="1" height="1" fill="#5A5A6E"/>
  <rect x="6" y="8" width="1" height="1" fill="#1a1a1a"/>
  <rect x="7" y="8" width="1" height="1" fill="#5A5A6E"/>
  <rect x="8" y="8" width="1" height="1" fill="#1a1a1a"/>
  <rect x="9" y="8" width="1" height="1" fill="#5A5A6E"/>
  <rect x="10" y="8" width="1" height="1" fill="#3A3A4A"/>
  <rect x="14" y="8" width="1" height="1" fill="#3A3A4A"/>
  <!-- row 9: body -->
  <rect x="4" y="9" width="7" height="1" fill="#3A3A4A"/>
  <!-- row 10: arms + body -->
  <rect x="1" y="10" width="2" height="1" fill="#3A3A4A"/>
  <rect x="4" y="10" width="7" height="1" fill="#3A3A4A"/>
  <rect x="12" y="10" width="2" height="1" fill="#3A3A4A"/>
  <!-- row 11: arms extended + body -->
  <rect x="0" y="11" width="2" height="1" fill="#3A3A4A"/>
  <rect x="4" y="11" width="7" height="1" fill="#3A3A4A"/>
  <rect x="13" y="11" width="2" height="1" fill="#3A3A4A"/>
  <!-- row 12: body lower -->
  <rect x="4" y="12" width="7" height="1" fill="#3A3A4A"/>
  <!-- row 13: body bottom + lightning marks -->
  <rect x="4" y="13" width="1" height="1" fill="#FFD700"/>
  <rect x="5" y="13" width="1" height="1" fill="#3A3A4A"/>
  <rect x="6" y="13" width="1" height="1" fill="#FFD700"/>
  <rect x="7" y="13" width="1" height="1" fill="#3A3A4A"/>
  <rect x="8" y="13" width="1" height="1" fill="#FFD700"/>
  <rect x="9" y="13" width="1" height="1" fill="#3A3A4A"/>
  <rect x="10" y="13" width="1" height="1" fill="#FFD700"/>
  <!-- row 14: feet -->
  <rect x="4" y="14" width="2" height="1" fill="#3A3A4A"/>
  <rect x="8" y="14" width="2" height="1" fill="#3A3A4A"/>
  <!-- row 15: feet bottom -->
  <rect x="4" y="15" width="1" height="1" fill="#3A3A4A"/>
  <rect x="9" y="15" width="1" height="1" fill="#3A3A4A"/>
</svg>
