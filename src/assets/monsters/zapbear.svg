<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- ears -->
  <circle cx="22" cy="22" r="9" fill="#3A3A4A"/>
  <circle cx="58" cy="22" r="9" fill="#3A3A4A"/>
  <circle cx="22" cy="22" r="5" fill="#FFD700"/>
  <circle cx="58" cy="22" r="5" fill="#FFD700"/>
  <!-- body -->
  <ellipse cx="40" cy="52" rx="24" ry="22" fill="#3A3A4A"/>
  <!-- lightning stripes -->
  <polygon points="32,34 38,44 34,44 40,56 26,44 30,44" fill="#FFD700"/>
  <polygon points="46,36 50,46 47,46 52,55 40,46 43,46" fill="#FFD700" opacity="0.7"/>
  <!-- belly -->
  <ellipse cx="40" cy="56" rx="14" ry="12" fill="#5A5A6E"/>
  <!-- eyes -->
  <circle cx="32" cy="46" r="5" fill="white"/>
  <circle cx="48" cy="46" r="5" fill="white"/>
  <circle cx="33" cy="47" r="2.5" fill="#222"/>
  <circle cx="49" cy="47" r="2.5" fill="#222"/>
  <circle cx="33.5" cy="46" r="1" fill="white"/>
  <circle cx="49.5" cy="46" r="1" fill="white"/>
  <!-- snout -->
  <ellipse cx="40" cy="53" rx="7" ry="5" fill="#555565"/>
  <ellipse cx="40" cy="50" rx="3.5" ry="2.5" fill="#333"/>
  <!-- arms -->
  <ellipse cx="16" cy="54" rx="7" ry="10" fill="#3A3A4A" transform="rotate(-15,16,54)"/>
  <ellipse cx="64" cy="54" rx="7" ry="10" fill="#3A3A4A" transform="rotate(15,64,54)"/>
  <!-- lightning on arms -->
  <line x1="13" y1="50" x2="18" y2="58" stroke="#FFD700" stroke-width="1.5"/>
  <line x1="67" y1="50" x2="62" y2="58" stroke="#FFD700" stroke-width="1.5"/>
  <!-- feet -->
  <ellipse cx="30" cy="73" rx="10" ry="5" fill="#3A3A4A"/>
  <ellipse cx="50" cy="73" rx="10" ry="5" fill="#3A3A4A"/>
  <!-- electric aura -->
  <circle cx="40" cy="45" r="27" fill="none" stroke="#FFD700" stroke-width="1" stroke-dasharray="4,6" opacity="0.4"/>
</svg>
