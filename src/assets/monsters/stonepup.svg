<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" shape-rendering="crispEdges">
  <!-- STONEPUP - Rock dog, Pokemon BW style, 20x20 grid @ 4px -->
  <!-- ── 귀 (늘어진 플로피 귀) ── -->
  <!-- 왼쪽 귀 -->
  <rect x="4"  y="4"  width="12" height="4"  fill="#1a1a1a"/>
  <rect x="4"  y="4"  width="8"  height="4"  fill="#888888"/>
  <rect x="0"  y="8"  width="4"  height="16" fill="#1a1a1a"/>
  <rect x="4"  y="8"  width="8"  height="16" fill="#aaaaaa"/>
  <rect x="12" y="8"  width="4"  height="12" fill="#1a1a1a"/>
  <rect x="6"  y="10" width="4"  height="8"  fill="#cccccc"/>  <!-- 귀 안쪽 밝음 -->
  <rect x="0"  y="24" width="12" height="4"  fill="#1a1a1a"/>
  <!-- 오른쪽 귀 -->
  <rect x="52" y="4"  width="12" height="4"  fill="#1a1a1a"/>
  <rect x="56" y="4"  width="8"  height="4"  fill="#888888"/>
  <rect x="64" y="8"  width="4"  height="16" fill="#1a1a1a"/>
  <rect x="56" y="8"  width="8"  height="16" fill="#aaaaaa"/>
  <rect x="52" y="8"  width="4"  height="12" fill="#1a1a1a"/>
  <rect x="58" y="10" width="4"  height="8"  fill="#cccccc"/>
  <rect x="56" y="24" width="12" height="4"  fill="#1a1a1a"/>
  <!-- ── 머리 ── -->
  <rect x="8"  y="8"  width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="12" y="8"  width="40" height="4"  fill="#999999"/>
  <rect x="16" y="8"  width="8"  height="4"  fill="#bbbbbb"/>
  <rect x="52" y="8"  width="4"  height="4"  fill="#1a1a1a"/>
  <!-- 머리 폭 -->
  <rect x="8"  y="12" width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="12" y="12" width="40" height="4"  fill="#aaaaaa"/>
  <rect x="52" y="12" width="4"  height="4"  fill="#1a1a1a"/>
  <!-- 바위 균열 (머리) -->
  <rect x="24" y="12" width="4"  height="4"  fill="#666666"/>
  <rect x="40" y="12" width="4"  height="4"  fill="#666666"/>
  <!-- ── 눈 ── -->
  <rect x="8"  y="16" width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="12" y="16" width="8"  height="4"  fill="#aaaaaa"/>
  <rect x="20" y="16" width="4"  height="4"  fill="#ffffff"/>
  <rect x="24" y="16" width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="28" y="16" width="8"  height="4"  fill="#aaaaaa"/>
  <rect x="36" y="16" width="4"  height="4"  fill="#ffffff"/>
  <rect x="40" y="16" width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="44" y="16" width="8"  height="4"  fill="#aaaaaa"/>
  <rect x="52" y="16" width="4"  height="4"  fill="#1a1a1a"/>
  <!-- 눈 2줄 -->
  <rect x="8"  y="20" width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="12" y="20" width="8"  height="4"  fill="#aaaaaa"/>
  <rect x="20" y="20" width="4"  height="4"  fill="#ffffff"/>
  <rect x="24" y="20" width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="28" y="20" width="8"  height="4"  fill="#aaaaaa"/>
  <rect x="36" y="20" width="4"  height="4"  fill="#ffffff"/>
  <rect x="40" y="20" width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="44" y="20" width="8"  height="4"  fill="#aaaaaa"/>
  <rect x="52" y="20" width="4"  height="4"  fill="#1a1a1a"/>
  <!-- ── 주둥이 ── -->
  <rect x="8"  y="24" width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="12" y="24" width="40" height="4"  fill="#aaaaaa"/>
  <rect x="52" y="24" width="4"  height="4"  fill="#1a1a1a"/>
  <!-- 코 -->
  <rect x="8"  y="28" width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="12" y="28" width="12" height="4"  fill="#aaaaaa"/>
  <rect x="24" y="28" width="4"  height="4"  fill="#bbbbbb"/>
  <rect x="28" y="28" width="4"  height="4"  fill="#555555"/>  <!-- 코 -->
  <rect x="32" y="28" width="4"  height="4"  fill="#555555"/>
  <rect x="36" y="28" width="4"  height="4"  fill="#bbbbbb"/>
  <rect x="40" y="28" width="12" height="4"  fill="#aaaaaa"/>
  <rect x="52" y="28" width="4"  height="4"  fill="#1a1a1a"/>
  <!-- ── 몸통 ── -->
  <rect x="4"  y="32" width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="8"  y="32" width="48" height="4"  fill="#999999"/>
  <rect x="12" y="32" width="8"  height="4"  fill="#bbbbbb"/>
  <rect x="56" y="32" width="4"  height="4"  fill="#1a1a1a"/>
  <!-- 몸통 균열 무늬 -->
  <rect x="4"  y="36" width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="8"  y="36" width="8"  height="4"  fill="#888888"/>
  <rect x="16" y="36" width="4"  height="4"  fill="#666666"/>  <!-- 균열 -->
  <rect x="20" y="36" width="16" height="4"  fill="#aaaaaa"/>
  <rect x="36" y="36" width="4"  height="4"  fill="#666666"/>
  <rect x="40" y="36" width="12" height="4"  fill="#999999"/>
  <rect x="52" y="36" width="4"  height="4"  fill="#888888"/>
  <rect x="56" y="36" width="4"  height="4"  fill="#1a1a1a"/>
  <!-- 몸통 중간 -->
  <rect x="4"  y="40" width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="8"  y="40" width="48" height="4"  fill="#aaaaaa"/>
  <rect x="56" y="40" width="4"  height="4"  fill="#1a1a1a"/>
  <!-- 몸통 균열 2 -->
  <rect x="4"  y="44" width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="8"  y="44" width="4"  height="4"  fill="#888888"/>
  <rect x="12" y="44" width="4"  height="4"  fill="#666666"/>
  <rect x="16" y="44" width="28" height="4"  fill="#aaaaaa"/>
  <rect x="44" y="44" width="4"  height="4"  fill="#666666"/>
  <rect x="48" y="44" width="4"  height="4"  fill="#888888"/>
  <rect x="52" y="44" width="4"  height="4"  fill="#aaaaaa"/>
  <rect x="56" y="44" width="4"  height="4"  fill="#1a1a1a"/>
  <!-- 하단 몸통 -->
  <rect x="8"  y="48" width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="12" y="48" width="40" height="4"  fill="#999999"/>
  <rect x="52" y="48" width="4"  height="4"  fill="#1a1a1a"/>
  <!-- ── 다리 (뭉툭하고 두꺼운) ── -->
  <rect x="8"  y="52" width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="12" y="52" width="16" height="4"  fill="#aaaaaa"/>
  <rect x="28" y="52" width="8"  height="4"  fill="#1a1a1a"/>
  <rect x="36" y="52" width="16" height="4"  fill="#aaaaaa"/>
  <rect x="52" y="52" width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="8"  y="56" width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="12" y="56" width="16" height="4"  fill="#888888"/>
  <rect x="28" y="56" width="8"  height="4"  fill="#1a1a1a"/>
  <rect x="36" y="56" width="16" height="4"  fill="#888888"/>
  <rect x="52" y="56" width="4"  height="4"  fill="#1a1a1a"/>
  <!-- 발 (넓고 무거운) -->
  <rect x="4"  y="60" width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="8"  y="60" width="20" height="4"  fill="#777777"/>
  <rect x="28" y="60" width="8"  height="4"  fill="#1a1a1a"/>
  <rect x="36" y="60" width="20" height="4"  fill="#777777"/>
  <rect x="56" y="60" width="4"  height="4"  fill="#1a1a1a"/>
  <!-- 발바닥 -->
  <rect x="4"  y="64" width="28" height="4"  fill="#1a1a1a"/>
  <rect x="36" y="64" width="24" height="4"  fill="#1a1a1a"/>
</svg>
