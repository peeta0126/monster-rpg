<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- ice crystal body hexagon -->
  <polygon points="40,8 58,19 58,41 40,52 22,41 22,19" fill="#C8EEFF" stroke="#88CCFF" stroke-width="2"/>
  <!-- inner crystal glow -->
  <polygon points="40,16 52,23 52,37 40,44 28,37 28,23" fill="#E8F8FF" opacity="0.7"/>
  <!-- crystal facets -->
  <line x1="40" y1="8" x2="40" y2="52" stroke="#99DDFF" stroke-width="1" opacity="0.6"/>
  <line x1="22" y1="19" x2="58" y2="41" stroke="#99DDFF" stroke-width="1" opacity="0.6"/>
  <line x1="58" y1="19" x2="22" y2="41" stroke="#99DDFF" stroke-width="1" opacity="0.6"/>
  <!-- snowflake on body -->
  <line x1="40" y1="24" x2="40" y2="36" stroke="#4499CC" stroke-width="1.5"/>
  <line x1="34" y1="27" x2="46" y2="33" stroke="#4499CC" stroke-width="1.5"/>
  <line x1="34" y1="33" x2="46" y2="27" stroke="#4499CC" stroke-width="1.5"/>
  <!-- eyes -->
  <circle cx="34" cy="26" r="3.5" fill="white"/>
  <circle cx="46" cy="26" r="3.5" fill="white"/>
  <circle cx="34.5" cy="27" r="1.8" fill="#1166AA"/>
  <circle cx="46.5" cy="27" r="1.8" fill="#1166AA"/>
  <circle cx="35" cy="26.5" r="0.7" fill="white"/>
  <circle cx="47" cy="26.5" r="0.7" fill="white"/>
  <!-- small mouth -->
  <path d="M37,33 Q40,35 43,33" stroke="#4488BB" stroke-width="1.2" fill="none"/>
  <!-- ice spike legs -->
  <polygon points="31,52 28,68 34,52" fill="#99CCEE"/>
  <polygon points="49,52 52,68 46,52" fill="#99CCEE"/>
  <!-- ice crystal arms -->
  <polygon points="22,28 10,24 22,33" fill="#AADDFF"/>
  <polygon points="58,28 70,24 58,33" fill="#AADDFF"/>
  <!-- floating ice particles -->
  <circle cx="15" cy="18" r="2" fill="#C8EEFF" opacity="0.7"/>
  <circle cx="66" cy="20" r="2.5" fill="#C8EEFF" opacity="0.6"/>
  <circle cx="12" cy="42" r="1.5" fill="#AADDFF" opacity="0.7"/>
  <circle cx="70" cy="42" r="1.5" fill="#AADDFF" opacity="0.6"/>
</svg>
