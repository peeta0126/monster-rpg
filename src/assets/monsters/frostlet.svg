<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- head top -->
  <rect x="4" y="0" width="6" height="1" fill="#7de4f0"/>
  <!-- head -->
  <rect x="3" y="1" width="8" height="1" fill="#7de4f0"/>
  <!-- cheek crystals -->
  <rect x="2" y="2" width="2" height="1" fill="#7de4f0"/>
  <rect x="4" y="2" width="1" height="1" fill="#3a9ab0"/>
  <rect x="5" y="2" width="4" height="1" fill="#7de4f0"/>
  <rect x="9" y="2" width="1" height="1" fill="#3a9ab0"/>
  <rect x="10" y="2" width="2" height="1" fill="#7de4f0"/>
  <!-- eyes -->
  <rect x="2" y="3" width="3" height="1" fill="#7de4f0"/>
  <rect x="5" y="3" width="1" height="1" fill="#FFFFFF"/>
  <rect x="6" y="3" width="1" height="1" fill="#1a1a1a"/>
  <rect x="7" y="3" width="1" height="1" fill="#7de4f0"/>
  <rect x="8" y="3" width="1" height="1" fill="#1a1a1a"/>
  <rect x="9" y="3" width="1" height="1" fill="#FFFFFF"/>
  <rect x="10" y="3" width="2" height="1" fill="#7de4f0"/>
  <!-- eyes row 2 -->
  <rect x="2" y="4" width="3" height="1" fill="#7de4f0"/>
  <rect x="5" y="4" width="1" height="1" fill="#FFFFFF"/>
  <rect x="6" y="4" width="1" height="1" fill="#1a1a1a"/>
  <rect x="7" y="4" width="1" height="1" fill="#7de4f0"/>
  <rect x="8" y="4" width="1" height="1" fill="#1a1a1a"/>
  <rect x="9" y="4" width="1" height="1" fill="#FFFFFF"/>
  <rect x="10" y="4" width="2" height="1" fill="#7de4f0"/>
  <!-- head bottom + snowflake -->
  <rect x="2" y="5" width="2" height="1" fill="#7de4f0"/>
  <rect x="4" y="5" width="1" height="1" fill="#3a9ab0"/>
  <rect x="5" y="5" width="4" height="1" fill="#7de4f0"/>
  <rect x="9" y="5" width="1" height="1" fill="#3a9ab0"/>
  <rect x="10" y="5" width="2" height="1" fill="#7de4f0"/>
  <!-- belly light -->
  <rect x="2" y="6" width="2" height="1" fill="#7de4f0"/>
  <rect x="4" y="6" width="6" height="1" fill="#b8f0f8"/>
  <rect x="10" y="6" width="2" height="1" fill="#7de4f0"/>
  <!-- belly snowflake marks -->
  <rect x="2" y="7" width="2" height="1" fill="#7de4f0"/>
  <rect x="4" y="7" width="2" height="1" fill="#b8f0f8"/>
  <rect x="6" y="7" width="1" height="1" fill="#3a9ab0"/>
  <rect x="7" y="7" width="1" height="1" fill="#b8f0f8"/>
  <rect x="8" y="7" width="1" height="1" fill="#3a9ab0"/>
  <rect x="9" y="7" width="1" height="1" fill="#b8f0f8"/>
  <rect x="10" y="7" width="2" height="1" fill="#7de4f0"/>
  <!-- body narrowing -->
  <rect x="3" y="8" width="2" height="1" fill="#7de4f0"/>
  <rect x="5" y="8" width="4" height="1" fill="#b8f0f8"/>
  <rect x="9" y="8" width="2" height="1" fill="#7de4f0"/>
  <!-- lower body -->
  <rect x="3" y="9" width="7" height="1" fill="#7de4f0"/>
  <!-- ice crystal arms -->
  <rect x="1" y="10" width="1" height="1" fill="#3a9ab0"/>
  <rect x="4" y="10" width="5" height="1" fill="#7de4f0"/>
  <rect x="11" y="10" width="1" height="1" fill="#3a9ab0"/>
  <!-- crystal arms wide -->
  <rect x="0" y="11" width="3" height="1" fill="#3a9ab0"/>
  <rect x="5" y="11" width="3" height="1" fill="#7de4f0"/>
  <rect x="10" y="11" width="3" height="1" fill="#3a9ab0"/>
  <!-- crystal taper -->
  <rect x="1" y="12" width="1" height="1" fill="#3a9ab0"/>
  <rect x="5" y="12" width="3" height="1" fill="#7de4f0"/>
  <rect x="11" y="12" width="1" height="1" fill="#3a9ab0"/>
  <!-- body bottom -->
  <rect x="5" y="13" width="3" height="1" fill="#7de4f0"/>
  <!-- feet -->
  <rect x="4" y="14" width="2" height="1" fill="#7de4f0"/>
  <rect x="7" y="14" width="2" height="1" fill="#7de4f0"/>
  <!-- feet bottom -->
  <rect x="3" y="15" width="2" height="1" fill="#3a9ab0"/>
  <rect x="8" y="15" width="2" height="1" fill="#3a9ab0"/>
</svg>
