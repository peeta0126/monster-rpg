<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- ears -->
  <rect x="0" y="0" width="2" height="1" fill="#c8e8f8"/>
  <rect x="12" y="0" width="2" height="1" fill="#c8e8f8"/>
  <!-- ear inner -->
  <rect x="0" y="1" width="1" height="1" fill="#c8e8f8"/>
  <rect x="1" y="1" width="1" height="1" fill="#5080a0"/>
  <rect x="2" y="1" width="1" height="1" fill="#c8e8f8"/>
  <rect x="11" y="1" width="1" height="1" fill="#c8e8f8"/>
  <rect x="12" y="1" width="1" height="1" fill="#5080a0"/>
  <rect x="13" y="1" width="1" height="1" fill="#c8e8f8"/>
  <!-- ear base + head connect -->
  <rect x="0" y="2" width="1" height="1" fill="#c8e8f8"/>
  <rect x="1" y="2" width="1" height="1" fill="#5080a0"/>
  <rect x="2" y="2" width="9" height="1" fill="#c8e8f8"/>
  <rect x="11" y="2" width="1" height="1" fill="#c8e8f8"/>
  <rect x="12" y="2" width="1" height="1" fill="#5080a0"/>
  <rect x="13" y="2" width="1" height="1" fill="#c8e8f8"/>
  <!-- head top with fur -->
  <rect x="0" y="3" width="2" height="1" fill="#c8e8f8"/>
  <rect x="3" y="3" width="8" height="1" fill="#8ab8d0"/>
  <rect x="12" y="3" width="2" height="1" fill="#c8e8f8"/>
  <!-- head -->
  <rect x="3" y="4" width="2" height="1" fill="#c8e8f8"/>
  <rect x="5" y="4" width="5" height="1" fill="#8ab8d0"/>
  <rect x="10" y="4" width="2" height="1" fill="#c8e8f8"/>
  <!-- eyes -->
  <rect x="3" y="5" width="1" height="1" fill="#c8e8f8"/>
  <rect x="4" y="5" width="1" height="1" fill="#FFFFFF"/>
  <rect x="5" y="5" width="1" height="1" fill="#1a1a1a"/>
  <rect x="6" y="5" width="2" height="1" fill="#8ab8d0"/>
  <rect x="8" y="5" width="1" height="1" fill="#1a1a1a"/>
  <rect x="9" y="5" width="1" height="1" fill="#FFFFFF"/>
  <rect x="10" y="5" width="1" height="1" fill="#c8e8f8"/>
  <!-- eyes row 2 -->
  <rect x="3" y="6" width="1" height="1" fill="#c8e8f8"/>
  <rect x="4" y="6" width="1" height="1" fill="#FFFFFF"/>
  <rect x="5" y="6" width="1" height="1" fill="#1a1a1a"/>
  <rect x="6" y="6" width="2" height="1" fill="#8ab8d0"/>
  <rect x="8" y="6" width="1" height="1" fill="#1a1a1a"/>
  <rect x="9" y="6" width="1" height="1" fill="#FFFFFF"/>
  <rect x="10" y="6" width="1" height="1" fill="#c8e8f8"/>
  <!-- muzzle area -->
  <rect x="2" y="7" width="3" height="1" fill="#c8e8f8"/>
  <rect x="5" y="7" width="5" height="1" fill="#8ab8d0"/>
  <rect x="10" y="7" width="3" height="1" fill="#c8e8f8"/>
  <!-- front paws + snout -->
  <rect x="0" y="8" width="1" height="1" fill="#c8e8f8"/>
  <rect x="2" y="8" width="1" height="1" fill="#c8e8f8"/>
  <rect x="5" y="8" width="2" height="1" fill="#8ab8d0"/>
  <rect x="7" y="8" width="1" height="1" fill="#5080a0"/>
  <rect x="8" y="8" width="2" height="1" fill="#8ab8d0"/>
  <rect x="12" y="8" width="1" height="1" fill="#c8e8f8"/>
  <rect x="14" y="8" width="1" height="1" fill="#c8e8f8"/>
  <!-- nose -->
  <rect x="5" y="9" width="1" height="1" fill="#8ab8d0"/>
  <rect x="6" y="9" width="1" height="1" fill="#5080a0"/>
  <rect x="7" y="9" width="1" height="1" fill="#1a1a1a"/>
  <rect x="8" y="9" width="1" height="1" fill="#5080a0"/>
  <rect x="9" y="9" width="1" height="1" fill="#8ab8d0"/>
  <!-- body -->
  <rect x="5" y="10" width="5" height="1" fill="#8ab8d0"/>
  <!-- body -->
  <rect x="5" y="11" width="5" height="1" fill="#8ab8d0"/>
  <!-- body with ice crystals -->
  <rect x="4" y="12" width="1" height="1" fill="#c8e8f8"/>
  <rect x="5" y="12" width="5" height="1" fill="#8ab8d0"/>
  <rect x="10" y="12" width="1" height="1" fill="#c8e8f8"/>
  <!-- body bottom -->
  <rect x="4" y="13" width="1" height="1" fill="#c8e8f8"/>
  <rect x="5" y="13" width="5" height="1" fill="#8ab8d0"/>
  <rect x="10" y="13" width="1" height="1" fill="#c8e8f8"/>
  <!-- feet -->
  <rect x="4" y="14" width="1" height="1" fill="#c8e8f8"/>
  <rect x="5" y="14" width="1" height="1" fill="#8ab8d0"/>
  <rect x="8" y="14" width="1" height="1" fill="#8ab8d0"/>
  <rect x="9" y="14" width="1" height="1" fill="#c8e8f8"/>
  <!-- feet bottom -->
  <rect x="3" y="15" width="1" height="1" fill="#c8e8f8"/>
  <rect x="4" y="15" width="1" height="1" fill="#8ab8d0"/>
  <rect x="9" y="15" width="1" height="1" fill="#8ab8d0"/>
  <rect x="10" y="15" width="1" height="1" fill="#c8e8f8"/>
</svg>
