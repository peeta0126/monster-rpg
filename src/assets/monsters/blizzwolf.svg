<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" shape-rendering="crispEdges">
  <!-- BLIZZWOLF - Ice wolf, 4-legged, Pokemon BW style, 20x20 grid @ 4px -->
  <!-- ── 뾰족 귀 ── -->
  <rect x="8"  y="0"  width="8"  height="4"  fill="#1a1a1a"/>
  <rect x="8"  y="0"  width="4"  height="4"  fill="#c0e8f8"/>
  <rect x="4"  y="4"  width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="8"  y="4"  width="8"  height="4"  fill="#c0e8f8"/>
  <rect x="4"  y="4"  width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="12" y="4"  width="4"  height="4"  fill="#5090b0"/>
  <rect x="16" y="4"  width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="48" y="0"  width="8"  height="4"  fill="#1a1a1a"/>
  <rect x="52" y="0"  width="4"  height="4"  fill="#c0e8f8"/>
  <rect x="52" y="4"  width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="48" y="4"  width="4"  height="4"  fill="#5090b0"/>
  <rect x="44" y="4"  width="4"  height="4"  fill="#c0e8f8"/>
  <rect x="56" y="4"  width="4"  height="4"  fill="#1a1a1a"/>
  <!-- ── 머리 ── -->
  <rect x="4"  y="8"  width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="8"  y="8"  width="48" height="4"  fill="#c0e8f8"/>
  <rect x="12" y="8"  width="8"  height="4"  fill="#ddf4ff"/>
  <rect x="44" y="8"  width="8"  height="4"  fill="#ddf4ff"/>
  <rect x="56" y="8"  width="4"  height="4"  fill="#1a1a1a"/>
  <!-- 머리 폭 -->
  <rect x="4"  y="12" width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="8"  y="12" width="8"  height="4"  fill="#88bbcc"/>
  <rect x="16" y="12" width="32" height="4"  fill="#c0e8f8"/>
  <rect x="48" y="12" width="8"  height="4"  fill="#88bbcc"/>
  <rect x="56" y="12" width="4"  height="4"  fill="#1a1a1a"/>
  <!-- ── 눈 (파란 눈) ── -->
  <rect x="0"  y="16" width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="4"  y="16" width="8"  height="4"  fill="#c0e8f8"/>
  <rect x="12" y="16" width="4"  height="4"  fill="#ffffff"/>
  <rect x="16" y="16" width="4"  height="4"  fill="#2266aa"/>
  <rect x="20" y="16" width="20" height="4"  fill="#c0e8f8"/>
  <rect x="40" y="16" width="4"  height="4"  fill="#ffffff"/>
  <rect x="44" y="16" width="4"  height="4"  fill="#2266aa"/>
  <rect x="48" y="16" width="8"  height="4"  fill="#c0e8f8"/>
  <rect x="56" y="16" width="4"  height="4"  fill="#1a1a1a"/>
  <!-- 눈 2줄 -->
  <rect x="0"  y="20" width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="4"  y="20" width="8"  height="4"  fill="#c0e8f8"/>
  <rect x="12" y="20" width="4"  height="4"  fill="#ffffff"/>
  <rect x="16" y="20" width="4"  height="4"  fill="#2266aa"/>
  <rect x="20" y="20" width="20" height="4"  fill="#c0e8f8"/>
  <rect x="40" y="20" width="4"  height="4"  fill="#ffffff"/>
  <rect x="44" y="20" width="4"  height="4"  fill="#2266aa"/>
  <rect x="48" y="20" width="8"  height="4"  fill="#c0e8f8"/>
  <rect x="56" y="20" width="4"  height="4"  fill="#1a1a1a"/>
  <!-- ── 주둥이 + 이빨 ── -->
  <rect x="0"  y="24" width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="4"  y="24" width="12" height="4"  fill="#c0e8f8"/>
  <rect x="16" y="24" width="28" height="4"  fill="#88bbcc"/>
  <rect x="44" y="24" width="12" height="4"  fill="#c0e8f8"/>
  <rect x="56" y="24" width="4"  height="4"  fill="#1a1a1a"/>
  <!-- 코 + 이빨 -->
  <rect x="0"  y="28" width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="4"  y="28" width="12" height="4"  fill="#c0e8f8"/>
  <rect x="16" y="28" width="4"  height="4"  fill="#88bbcc"/>
  <rect x="20" y="28" width="4"  height="4"  fill="#1a1a1a"/>  <!-- 코 -->
  <rect x="24" y="28" width="4"  height="4"  fill="#88bbcc"/>
  <rect x="28" y="28" width="4"  height="4"  fill="#ffffff"/>  <!-- 이빨 -->
  <rect x="32" y="28" width="4"  height="4"  fill="#88bbcc"/>
  <rect x="36" y="28" width="4"  height="4"  fill="#ffffff"/>  <!-- 이빨 -->
  <rect x="40" y="28" width="4"  height="4"  fill="#88bbcc"/>
  <rect x="44" y="28" width="12" height="4"  fill="#c0e8f8"/>
  <rect x="56" y="28" width="4"  height="4"  fill="#1a1a1a"/>
  <!-- ── 몸통 ── -->
  <rect x="4"  y="32" width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="8"  y="32" width="48" height="4"  fill="#c0e8f8"/>
  <rect x="12" y="32" width="8"  height="4"  fill="#ddf4ff"/>
  <rect x="52" y="32" width="4"  height="4"  fill="#1a1a1a"/>
  <!-- 몸통 줄기 -->
  <rect x="4"  y="36" width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="8"  y="36" width="4"  height="4"  fill="#88bbcc"/>
  <rect x="12" y="36" width="40" height="4"  fill="#c0e8f8"/>
  <rect x="52" y="36" width="4"  height="4"  fill="#88bbcc"/>
  <rect x="56" y="36" width="4"  height="4"  fill="#1a1a1a"/>
  <!-- 등 (약간 짙은) -->
  <rect x="4"  y="40" width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="8"  y="40" width="4"  height="4"  fill="#5090b0"/>
  <rect x="12" y="40" width="40" height="4"  fill="#88bbcc"/>
  <rect x="52" y="40" width="4"  height="4"  fill="#5090b0"/>
  <rect x="56" y="40" width="4"  height="4"  fill="#1a1a1a"/>
  <!-- 몸통 하단 -->
  <rect x="8"  y="44" width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="12" y="44" width="40" height="4"  fill="#c0e8f8"/>
  <rect x="52" y="44" width="4"  height="4"  fill="#1a1a1a"/>
  <!-- ── 4족 다리 ── -->
  <!-- 앞 왼쪽 다리 -->
  <rect x="8"  y="48" width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="12" y="48" width="12" height="4"  fill="#c0e8f8"/>
  <rect x="24" y="48" width="4"  height="4"  fill="#1a1a1a"/>
  <!-- 앞 오른쪽 다리 -->
  <rect x="36" y="48" width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="40" y="48" width="12" height="4"  fill="#c0e8f8"/>
  <rect x="52" y="48" width="4"  height="4"  fill="#1a1a1a"/>
  <!-- 뒷 왼쪽 다리 -->
  <rect x="8"  y="52" width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="12" y="52" width="12" height="4"  fill="#88bbcc"/>
  <rect x="24" y="52" width="4"  height="4"  fill="#1a1a1a"/>
  <!-- 뒷 오른쪽 다리 -->
  <rect x="36" y="52" width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="40" y="52" width="12" height="4"  fill="#88bbcc"/>
  <rect x="52" y="52" width="4"  height="4"  fill="#1a1a1a"/>
  <!-- 발 -->
  <rect x="4"  y="56" width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="8"  y="56" width="16" height="4"  fill="#5090b0"/>
  <rect x="24" y="56" width="8"  height="4"  fill="#1a1a1a"/>
  <rect x="32" y="56" width="8"  height="4"  fill="#1a1a1a"/>
  <rect x="40" y="56" width="16" height="4"  fill="#5090b0"/>
  <rect x="56" y="56" width="4"  height="4"  fill="#1a1a1a"/>
  <!-- 발톱 -->
  <rect x="4"  y="60" width="24" height="4"  fill="#1a1a1a"/>
  <rect x="36" y="60" width="24" height="4"  fill="#1a1a1a"/>
  <!-- ── 꼬리 (얼음 갈래꼬리) ── -->
  <rect x="56" y="40" width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="60" y="40" width="4"  height="4"  fill="#c0e8f8"/>
  <rect x="60" y="44" width="8"  height="4"  fill="#1a1a1a"/>
  <rect x="64" y="44" width="4"  height="4"  fill="#88bbcc"/>
  <rect x="64" y="48" width="4"  height="4"  fill="#1a1a1a"/>
  <rect x="68" y="44" width="4"  height="4"  fill="#5090b0"/>
  <rect x="68" y="48" width="4"  height="4"  fill="#1a1a1a"/>
</svg>
