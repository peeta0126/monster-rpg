<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- tail -->
  <ellipse cx="70" cy="55" rx="10" ry="6" fill="#C8E8FF" transform="rotate(-30,70,55)"/>
  <ellipse cx="70" cy="55" rx="6" ry="3" fill="white" transform="rotate(-30,70,55)"/>
  <!-- body -->
  <ellipse cx="42" cy="52" rx="22" ry="17" fill="#C8E8FF"/>
  <!-- belly -->
  <ellipse cx="40" cy="56" rx="13" ry="10" fill="white"/>
  <!-- head -->
  <ellipse cx="28" cy="36" rx="16" ry="14" fill="#C8E8FF"/>
  <!-- ears -->
  <polygon points="18,26 14,10 26,22" fill="#C8E8FF" stroke="#99BBDD" stroke-width="1"/>
  <polygon points="38,26 42,10 32,22" fill="#C8E8FF" stroke="#99BBDD" stroke-width="1"/>
  <polygon points="19,26 16,16 25,23" fill="#99BBCC" opacity="0.5"/>
  <polygon points="37,26 40,16 33,23" fill="#99BBCC" opacity="0.5"/>
  <!-- ice markings on head -->
  <path d="M18,32 Q22,28 26,32" stroke="#88BBDD" stroke-width="2" fill="none"/>
  <path d="M30,32 Q34,28 38,32" stroke="#88BBDD" stroke-width="2" fill="none"/>
  <!-- eyes -->
  <circle cx="23" cy="34" r="4" fill="white"/>
  <circle cx="35" cy="34" r="4" fill="white"/>
  <circle cx="23.5" cy="35" r="2" fill="#1166AA"/>
  <circle cx="35.5" cy="35" r="2" fill="#1166AA"/>
  <circle cx="24" cy="34.5" r="0.8" fill="white"/>
  <circle cx="36" cy="34.5" r="0.8" fill="white"/>
  <!-- snout -->
  <ellipse cx="29" cy="42" rx="8" ry="5" fill="#E0F0FF"/>
  <ellipse cx="29" cy="39" rx="4" ry="3" fill="#99AABB"/>
  <!-- mouth line -->
  <path d="M25,44 Q29,47 33,44" stroke="#9AAABB" stroke-width="1.2" fill="none"/>
  <!-- front legs -->
  <ellipse cx="24" cy="67" rx="7" ry="5" fill="#C8E8FF"/>
  <ellipse cx="40" cy="68" rx="7" ry="5" fill="#C8E8FF"/>
  <!-- back legs -->
  <ellipse cx="52" cy="67" rx="7" ry="5" fill="#B8D8EF"/>
  <!-- ice crystals on back -->
  <polygon points="46,40 50,32 54,40" fill="#88CCFF" opacity="0.8"/>
  <polygon points="54,38 58,30 62,38" fill="#88CCFF" opacity="0.7"/>
  <!-- ice breath puff -->
  <circle cx="14" cy="42" r="3" fill="#DDEEFF" opacity="0.6"/>
  <circle cx="8" cy="38" r="2.5" fill="#DDEEFF" opacity="0.5"/>
  <circle cx="5" cy="33" r="2" fill="#DDEEFF" opacity="0.4"/>
</svg>
